<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Deep Sea Prospector</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
        <script src="js/Enums.js"></script>
        <script src="js/GameObject.js"></script>
        <script src="js/SeaItem.js"></script>
        <script src="js/Hook.js"></script>
        <script src="js/Player.js"></script>
        <script src="js/ScoreEntry.js"></script>
        <script src="js/HighScoreManager.js"></script>
        <script src="js/ShopItem.js"></script>
        <script src="js/ShopManager.js"></script>
        <script src="js/LevelManager.js"></script>
        <script src="js/GameManager.js"></script>
        <script src="sketch.js"></script>
        <style>
            body {
                padding: 0;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #333;
            }
            #game-container {
                position: relative;
                width: 800px;
                height: 600px;
            }
            #game-container canvas {
                display: block;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            }
            #button-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 60px;
                padding-top: 30px;
                pointer-events: none;
            }
            #button-overlay.active {
                pointer-events: auto;
            }
            #button-overlay.hidden {
                display: none;
            }
            .btn-group {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 28px;
            }
            .btn-row {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
            .btn-group.hidden {
                display: none;
            }
            .unavailable {
                font-family: 'Press Start 2P', monospace;
                font-size: 10px;
                color: rgba(255, 200, 200, 0.9);
            }
            .unavailable.orange {
                color: rgba(255, 220, 180, 0.9);
            }

            .pixel-btn {
                appearance: none;
                outline: none;
                position: relative;
                cursor: pointer;
                padding: 20px 48px;
                font-family: 'Press Start 2P', monospace;
                font-size: 18px;
                color: #fbf5da;
                text-transform: uppercase;
                border: 6px solid #1c2b36;
                background-color: #61a176;
                background-image: conic-gradient(
                    #569269 90deg,
                    transparent 90deg 180deg,
                    #569269 180deg 270deg,
                    transparent 270deg
                );
                background-size: 8px 8px;
                box-shadow:
                    inset 6px 6px 0px #b2d6e3,
                    inset -6px -6px 0px #6e95a3,
                    inset 12px 12px 0px #79b88e,
                    inset -12px -12px 0px #4d8461;
                text-shadow:
                    4px 4px 0px #1c2b36,
                    -4px -4px 0px #1c2b36,
                    4px -4px 0px #1c2b36,
                    -4px 4px 0px #1c2b36,
                    0px 4px 0px #1c2b36,
                    4px 0px 0px #1c2b36,
                    0px -4px 0px #1c2b36,
                    -4px 0px 0px #1c2b36;
                transition: transform 0.1s;
            }
            .pixel-btn:hover {
                background-color: #6bb082;
            }
            .pixel-btn:active {
                box-shadow:
                    inset 6px 6px 0px #6e95a3,
                    inset -6px -6px 0px #b2d6e3,
                    inset 12px 12px 0px #4d8461,
                    inset -12px -12px 0px #79b88e;
                transform: translateY(4px);
            }

            .pixel-btn-hard {
                background-color: #c04f4a;
                background-image: conic-gradient(
                    #a8433f 90deg,
                    transparent 90deg 180deg,
                    #a8433f 180deg 270deg,
                    transparent 270deg
                );
                box-shadow:
                    inset 6px 6px 0px #b2d6e3,
                    inset -6px -6px 0px #6e95a3,
                    inset 12px 12px 0px #d4655f,
                    inset -12px -12px 0px #8b3431;
            }
            .pixel-btn-hard:hover {
                background-color: #d65a55;
            }
            .pixel-btn-hard:active {
                box-shadow:
                    inset 6px 6px 0px #6e95a3,
                    inset -6px -6px 0px #b2d6e3,
                    inset 12px 12px 0px #8b3431,
                    inset -12px -12px 0px #d4655f;
            }

            .pixel-btn-blue {
                background-color: #4a7bc0;
                background-image: conic-gradient(
                    #3d6aa8 90deg,
                    transparent 90deg 180deg,
                    #3d6aa8 180deg 270deg,
                    transparent 270deg
                );
                box-shadow:
                    inset 6px 6px 0px #b2d6e3,
                    inset -6px -6px 0px #6e95a3,
                    inset 12px 12px 0px #6b9bd4,
                    inset -12px -12px 0px #355a8a;
            }
            .pixel-btn-blue:hover {
                background-color: #5a8bd0;
            }
            .pixel-btn-blue:active {
                box-shadow:
                    inset 6px 6px 0px #6e95a3,
                    inset -6px -6px 0px #b2d6e3,
                    inset 12px 12px 0px #355a8a,
                    inset -12px -12px 0px #6b9bd4;
            }

            .pixel-btn-orange {
                background-color: #c98b4a;
                background-image: conic-gradient(
                    #a8733f 90deg,
                    transparent 90deg 180deg,
                    #a8733f 180deg 270deg,
                    transparent 270deg
                );
                box-shadow:
                    inset 6px 6px 0px #b2d6e3,
                    inset -6px -6px 0px #6e95a3,
                    inset 12px 12px 0px #d9a065,
                    inset -12px -12px 0px #8b5a2a;
            }
            .pixel-btn-orange:hover {
                background-color: #d99b5a;
            }
            .pixel-btn-orange:active {
                box-shadow:
                    inset 6px 6px 0px #6e95a3,
                    inset -6px -6px 0px #b2d6e3,
                    inset 12px 12px 0px #8b5a2a,
                    inset -12px -12px 0px #d9a065;
            }
        </style>
    </head>
    <body>
        <div id="game-container">
            <div id="button-overlay" class="hidden">
                <div id="difficulty-buttons" class="btn-group hidden">
                    <div class="btn-row">
                        <button class="pixel-btn" id="btn-easy">EASY</button>
                    </div>
                    <div class="btn-row">
                        <button class="pixel-btn pixel-btn-hard" id="btn-hard">HARD</button>
                        <span class="unavailable">currently unavailable</span>
                    </div>
                </div>
                <div id="player-mode-buttons" class="btn-group hidden">
                    <div class="btn-row">
                        <button class="pixel-btn pixel-btn-blue" id="btn-single">SINGLE</button>
                        <span class="unavailable" id="single-unavailable">currently unavailable</span>
                    </div>
                    <div class="btn-row">
                        <button class="pixel-btn pixel-btn-orange" id="btn-two">TWO PLAYER</button>
                        <span class="unavailable orange">currently unavailable</span>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
